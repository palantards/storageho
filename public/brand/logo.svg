      <path d="M380 372c-24-22-52-38-76-48" stroke="black" stroke-width="20" stroke-linecap="round"/>
      <!-- Robe crease -->
      <path d="M256 310 L256 420" stroke="black" stroke-width="18" stroke-linecap="round"/>
